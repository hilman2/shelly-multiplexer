---
name: Shelly Multiplexer
version: "0.4.1"
slug: shelly_multiplexer
description: >-
  Pulse-based dispatcher: emulates a Shelly Pro 3EM and steers multiple
  battery storages (Marstek Venus E) via per-poll delta pulses. Each
  battery REQUIRES a Shelly Plug PM Gen3 for safety-critical cap
  enforcement. Status UI shows live plug power, pulse queue and per-
  battery operational state (taper, at-limit, SoC-gated, silent).
arch:
  - amd64
  - aarch64
  - armv7
url: https://github.com/hilman2/shelly-multiplexer
# Pre-built per architecture by GitHub Actions and pushed to GHCR.
# `{arch}` is substituted by the HA supervisor. Avoiding a local build
# means HA users don't need a Rust toolchain in their VM.
image: ghcr.io/hilman2/shelly-multiplexer-{arch}

# UDP/1010 + mDNS multicast require host networking so the inverters
# can find us on the LAN. host_network and Ingress can NOT be combined
# (Ingress lives on the hassio bridge, host_network bypasses it), so
# we expose the admin UI via the standard "Open Web UI" link instead.
host_network: true

# Grants the add-on a SUPERVISOR_TOKEN with access to the HA Core API.
# Used to read battery SoC from HA entities when the user configures
# `home_assistant.enabled = true` and per-battery `soc_entity_id`.
homeassistant_api: true

# Mounts /config/ inside the add-on (= /addon_configs/<slug>/ on the
# HA host) so the user can edit config.toml from the Studio Code Server
# add-on. /data/ would be private to the add-on and invisible to other
# add-ons.
map:
  - addon_config:rw

# Direct link to the admin UI. HA replaces [HOST]/[PORT:8080] with the
# host's IP and the configured port. Shows up as "OPEN WEB UI" on the
# add-on's Info tab.
webui: "http://[HOST]:[PORT:8080]"

# A boot-time options block. The full live configuration is done via
# the embedded web UI; here we expose only the bits a user needs to set
# before the first start so the multiplexer can reach the real Shelly.
options:
  real_shelly_host: "192.168.1.50"
  real_shelly_udp_port: 2020
  log_level: info
schema:
  real_shelly_host: str
  real_shelly_udp_port: port
  log_level: list(trace|debug|info|warn|error)

startup: services
boot: auto
# init: false because the HA-Base image's `/init` (s6-overlay) needs to
# be PID 1 — bashio's `with-contenv` shebang in run.sh depends on it.
# Setting init: true (the supervisor default) makes Docker insert its
# own tini as PID 1, which then fails s6-overlay-suexec with
# "can only run as pid 1".
init: false

# HA polls this URL; if it stops responding, the supervisor restarts
# the add-on. Toggle the watchdog from the add-on's Info tab in HA.
# `[HOST]` and `[PORT:8080]` are substituted by the supervisor.
watchdog: "http://[HOST]:[PORT:8080]/api/health"

# ShellyMultiplexer — example configuration (v0.8.0).
#
# Before starting the multiplexer the real Shelly Pro 3EM MUST be moved
# off the default UDP-RPC port 1010 (e.g. 2020) so the multiplexer can
# bind 1010 itself without colliding with the real device.
# In the Shelly: Settings → Advanced → Outbound RPC / UDP RPC.
#
# Every battery REQUIRES a dedicated Shelly Plug PM Gen3 (`plug_url`).
# The plug is the single safety ground truth for circuit-cap enforcement.
#
# v0.8 simplified the dispatcher knob set from ~25 down to ~12. Old TOMLs
# load unchanged — removed fields are silently ignored. The removed
# knobs (modbus_*_timeout_ms, modbus_heartbeat_s, modbus_min_write_interval_s,
# modbus_watchdog_grace_s, setpoint_deadband_w, grid_smoothing_s,
# hit_tolerance_w, pulse_count, group_silent_after_stale_s,
# soc_unknown_lockout_s, emergency_cutoff_grace_s, emergency_cutoff_recovery_s,
# night_cutoff_soc_margin_pct) are now compile-time constants with sensible
# defaults in dispatcher.rs / modbus.rs. The new `rate_limit_w_per_cycle`
# replaces EMA smoothing, the per-write throttle, and the heartbeat with
# a single algorithm-level ramp limit — same pattern as the upstream
# Python reference impl (hilman2/MarstekVenus).

[real_shelly]
# IP of the real Shelly Pro 3EM (the grid measurement source)
host = "192.168.1.50"
# Reconfigured UDP-RPC port on the real Shelly (default 1010 is taken by us)
udp_port = 2020
# How often we poll the real Shelly for grid_w
poll_interval_ms = 250
# Per-poll timeout
request_timeout_ms = 1000

[virtual_shelly]
# Interface the virtual Shelly listens on; 0.0.0.0 = all
bind_interface = "0.0.0.0"
# Standard Shelly UDP-RPC port — Marsteks expect 1010
udp_port = 1010
# HTTP/REST/RPC port (0 = disable). Marstek-only setups can leave this off.
# Some non-Marstek inverters need it.
http_port = 80
# MAC + hostname identification (empty = derive from primary NIC)
device_mac = ""
device_hostname = ""
firmware = "1.4.4"
# Advertise as `shellypro3em-<mac>` via mDNS so Marsteks auto-discover us.
# Disable on hosts where Avahi already runs (HA OS).
enable_mdns = true

[management]
# Web UI + admin API. Distinct from the virtual Shelly so it stays
# reachable even when the virtual Shelly binds port 80.
bind_address = "0.0.0.0:8080"

[dispatcher]
# Dispatch backend.
#   "modbus" (default): writes absolute power setpoints every cycle
#                       via registers 42010 / 42020 / 42021. Direct,
#                       cap-safe, requires `modbus_host` per battery.
#   "pulse"  (legacy):  Shelly-Pro-3EM CT emulation. For installs
#                       without per-battery Modbus reach.
mode = "modbus"
# Tick rate. 2 s matches the Marstek ramp window — going faster just
# queues commands the inverter can't act on. Combined with the rate
# limit below, this controls the overall response speed.
cycle_ms = 2000
# Grid-imbalance noise floor. Imbalances smaller than this are ignored.
deadband_w = 50
# Asymmetric "never cross zero" margin. Charging: leaves this many W
# of grid EXPORT unaddressed (never pulls import). Discharging: leaves
# this many W of grid IMPORT unaddressed (never pushes into export).
grid_bias_w = 100
# Max change of a battery's setpoint per cycle. Smooths big steps into
# a ramp — going 0 W → 2.5 kW takes ceil(2500 / 500) = 5 cycles ≈ 10 s.
# Replaces the EMA grid smoother + per-write throttle + heartbeat the
# v0.7 schema exposed. Same pattern as the Python reference impl's
# "max 750 W/cycle" rate limit.
rate_limit_w_per_cycle = 500
# SoC gates. BMS-reported cutoffs (Modbus reg 44000 / 44001) take
# precedence when available — those reflect the user's actual setting
# in the Marstek app and are far more authoritative.
soc_full_pct = 95
soc_empty_pct = 5
# Fraction of the circuit fuse cap the dispatcher will actually use.
# 0.95 = 5 % jitter buffer.
circuit_headroom = 0.95
# Plug silent this long → mute its circuit (cap math goes stale).
plug_stale_s = 5
# Real Shelly silent this long → mute every circuit.
grid_stale_s = 5
# Settle escape hatch: after a battery write, accept the cycle as done
# after this long even without observable plug movement. Bounds the
# wait if a Marstek refuses to react.
settle_timeout_s = 10
# Hardware safety: when the SIGNED plug-power sum on a circuit exceeds
# cap × headroom + this, physically open the worst offender's Shelly
# Plug relay. 0 disables. Grace + recovery are hardcoded at 5 s / 600 s.
emergency_cutoff_margin_w = 200
# Optional efficiency feature: between sunset and sunrise, disconnect
# empty batteries to skip the Marstek inverter's ~5-15 W standby loss.
# Requires [location] below. Hysteresis is hardcoded at 2 % SoC.
night_cutoff_enabled = false

[location]
# Required when [dispatcher].night_cutoff_enabled = true. Decimal
# degrees, WGS-84. Used to compute local sunrise / sunset.
# Example: München.
# latitude = 48.137
# longitude = 11.575

[home_assistant]
# SoC source switch (global).
#   enabled = false → SoC is read via Modbus TCP directly from each
#                     Marstek battery (default port 502). HA not used.
#   enabled = true  → SoC is read from HA entities. Every battery MUST
#                     have a soc_entity_id; Modbus is not used.
# Token can be left blank inside the add-on (sourced from
# $SUPERVISOR_TOKEN automatically).
enabled = false
url = "http://homeassistant.local:8123/api"
token = ""
timeout_ms = 3000

# --- Circuits ---
# A circuit is a shared protective device (MCB/RCD). The dispatcher
# enforces (signed sum of plug_w on members) ≤ cap_w × circuit_headroom.

[[circuits]]
id = "basement"
fuse_amps = 16
phases = 1            # 1 = single-phase, 3 = three-phase
voltage = 230
# → cap = 1 × 16 × 230 = 3680 W

# --- Batteries ---
# Each battery is identified by its IP address. Point the battery's
# "Shelly Pro 3EM" target at the multiplexer IP. plug_url is mandatory.

[[batteries]]
id = "marstek-a"
address = "192.168.1.51"           # static IP of the Marstek
circuit = "basement"
plug_url = "http://192.168.1.71"   # dedicated Shelly Plug PM Gen3
max_charge_w = 2500
max_discharge_w = 800
capacity_wh = 2500
priority_weight = 1.0
# marstek_model picks the Modbus register map per the ViperRNMC
# integration. Matches the four-way split in the HA "Mit Marstek
# Venus per Modbus verbinden" dialog:
#   "venus_a"       → Venus A
#   "venus_d"       → Venus D
#   "venus_e_v1_v2" → Venus E V1 / V2 (most common; default)
#   "venus_e_v3"    → Venus E V3 (newer, native Ethernet Modbus)
marstek_model = "venus_e_v1_v2"
# modbus_host: IP of the RS485-to-LAN bridge connected to the
# battery's RS485 port — most Marstek variants (A / D / E v1 / v2 /
# v1.2 / E 2.0) do NOT expose Modbus on their own WiFi interface.
# Common bridges: Waveshare, Elfin EW11, PUSR DR134, M5Stack Atom S3.
# For Venus E V3 with an Ethernet cable (recent firmware), set this to
# the same IP as `address` — the battery speaks Modbus TCP natively.
# If you leave this OUT, the battery loads as INACTIVE: the dispatcher
# skips it entirely until you configure a source. Old v0.4.x configs
# with `vendor` / `marstek_port` continue to load — those fields are
# now ignored.
modbus_host = "192.168.1.91"
modbus_port = 502
modbus_unit_id = 1
# Upper bound on SoC poll frequency. The SoC read is piggybacked onto
# the BatteryWriter's existing connection — no separate TCP socket.
soc_interval_ms = 60000
# SoC-based power tapering (optional). Real batteries can't accept
# full max_charge_w near 100 % SoC nor sustain full max_discharge_w
# near the empty cutoff — the BMS tapers internally. Modelling it here
# keeps the dispatcher's headroom math honest and prevents the
# "Marstek target wanders, plug doesn't follow" failure mode.
# Step semantics (no interpolation): SoC ≥ taper_soc → use taper_w.
charge_taper_soc_pct = 90          # at/above this SoC, cap charge…
charge_taper_w = 1000              # …to this many watts
discharge_taper_soc_pct = 15       # at/below this SoC, cap discharge…
discharge_taper_w = 400            # …to this many watts
# Optional per-battery SoC override (defaults to dispatcher.soc_full_pct/empty)
# soc_full_pct = 95
# soc_empty_pct = 5
# Required when [home_assistant].enabled = true (otherwise ignored).
# soc_entity_id = "sensor.marstek_a_soc"

[[batteries]]
id = "marstek-b"
address = "192.168.1.52"
circuit = "basement"
plug_url = "http://192.168.1.72"
max_charge_w = 2500
max_discharge_w = 800
capacity_wh = 2500
priority_weight = 1.0
marstek_model = "venus_e_v1_v2"
modbus_host = "192.168.1.92"   # IP of this battery's RS485-to-LAN bridge
modbus_port = 502
modbus_unit_id = 1
soc_interval_ms = 60000
charge_taper_soc_pct = 90
charge_taper_w = 1000
discharge_taper_soc_pct = 15
discharge_taper_w = 400

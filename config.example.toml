# ShellyMultiplexer — example configuration (v0.4.0+, pulse architecture).
#
# Before starting the multiplexer the real Shelly Pro 3EM MUST be moved
# off the default UDP-RPC port 1010 (e.g. 2020) so the multiplexer can
# bind 1010 itself without colliding with the real device.
# In the Shelly: Settings → Advanced → Outbound RPC / UDP RPC.
#
# Every battery REQUIRES a dedicated Shelly Plug PM Gen3 (`plug_url`).
# The plug is the single safety ground truth for circuit-cap enforcement.

[real_shelly]
# IP of the real Shelly Pro 3EM (the grid measurement source)
host = "192.168.1.50"
# Reconfigured UDP-RPC port on the real Shelly (default 1010 is taken by us)
udp_port = 2020
# How often we poll the real Shelly for grid_w
poll_interval_ms = 250
# Per-poll timeout
request_timeout_ms = 1000

[virtual_shelly]
# Interface the virtual Shelly listens on; 0.0.0.0 = all
bind_interface = "0.0.0.0"
# Standard Shelly UDP-RPC port — Marsteks expect 1010
udp_port = 1010
# HTTP/REST/RPC port (0 = disable). Marstek-only setups can leave this off.
# Some non-Marstek inverters need it.
http_port = 80
# MAC + hostname identification (empty = derive from primary NIC)
device_mac = ""
device_hostname = ""
firmware = "1.4.4"
# Advertise as `shellypro3em-<mac>` via mDNS so Marsteks auto-discover us.
# Disable on hosts where Avahi already runs (HA OS).
enable_mdns = true

[management]
# Web UI + admin API. Distinct from the virtual Shelly so it stays
# reachable even when the virtual Shelly binds port 80.
bind_address = "0.0.0.0:8080"

[dispatcher]
# Dispatch backend. "modbus" (default) writes power setpoints directly
# to each Marstek (registers 42010/42020/42021). "pulse" keeps the
# legacy Shelly-3EM-emulation path for non-Modbus setups.
mode = "modbus"
# Recompute interval for desired_w + setpoint generation. 1 s is a
# pragmatic default: Marstek inverters take 1-3 s to ramp toward a
# new setpoint, so a much faster cycle just queues writes the inverter
# can't act on. Faster (e.g. 200 ms) is fine in pulse mode.
cycle_ms = 1000
# Δ below this is ignored (Marstek-quantisation noise) AND is the
# minimum pulse magnitude we'll issue.
deadband_w = 50
# Plug-movement threshold that counts a previous pulse as "landed".
# Must be ≤ deadband_w (every issued pulse moves the plug by at least this).
hit_tolerance_w = 15
# Pulses sent per delta change (Marstek needs ≥ 2; 3 = safety margin)
pulse_count = 3
# SoC eligibility gates (per-battery overrides under [[batteries]])
soc_full_pct = 95
soc_empty_pct = 5
# Stale-measurement timeouts. If exceeded, the affected circuit (plug) /
# all circuits (grid) go silent for `group_silent_after_stale_s` so the
# Marstek watchdog clears its integrator.
plug_stale_s = 2.0
grid_stale_s = 5.0
group_silent_after_stale_s = 60.0
# Use only this fraction of the circuit fuse cap (jitter buffer)
circuit_headroom = 0.95
# Asymmetric grid bias: leave this many W on the import side when
# discharging (avoid accidental export) and on the export side when
# charging (avoid paying for grid). 0 = dispatch to exact 0.
grid_bias_w = 30
# Time-based pulse-settle fallback: if the plug hasn't moved by
# hit_tolerance_w within this many seconds, accept and move on.
settle_timeout_s = 10.0
# Empirical full/empty detection (PULSE MODE ONLY). When a battery
# refuses a directional pulse (significant request, no plug movement
# before settle_timeout_s elapses), that DIRECTION is locked for this
# many seconds. Modbus mode doesn't need it — direct telemetry (SoC,
# force_mode, battery_power) tells us the truth.
soc_unknown_lockout_s = 600

# ---- Modbus-dispatch tuning (mode = "modbus") ----
# Skip the Modbus write when the new setpoint is within this many W
# of the last successful write. Reduces traffic on slow RS485 bridges
# and prevents chasing tiny grid wobble.
setpoint_deadband_w = 100
# Re-write the current setpoint at least this often (heartbeat — also
# our process-liveness signal, Marstek firmware has no watchdog).
modbus_heartbeat_s = 30
# Hard minimum interval (seconds) between successive Modbus writes
# per battery. Even if the dispatcher decides the setpoint changed
# enough to warrant a write, the writer task refuses to fire faster
# than this — gives each Marstek time to ramp toward the new setpoint.
modbus_min_write_interval_s = 10
# Internal watchdog: if the dispatcher loop hangs for this long, a
# background task force-writes force_mode=0 and exits. 0 disables.
modbus_watchdog_grace_s = 30
# EMA smoothing on grid_w. PV inverters can swing the raw reading by
# ±2 kW at 4 Hz; without smoothing we'd chase that noise. 5 s gives
# a sensible tracking response without lagging real load changes.
grid_smoothing_s = 5

# ---- Emergency plug cutoff (safety) ----
# Hard-disconnect a battery via its Shelly Plug PM Gen3 relay when the
# circuit's measured plug sum exceeds cap × headroom + margin for the
# grace window. Last line of defence — soft control should keep us
# under cap normally. 0 disables.
emergency_cutoff_margin_w = 200
emergency_cutoff_grace_s = 5
emergency_cutoff_recovery_s = 600

# ---- Night cutoff (efficiency) ----
# Cut empty batteries between sunset and sunrise to skip the Marstek's
# ~5-15 W inverter standby loss. Requires [location] below to be set.
night_cutoff_enabled = false
night_cutoff_soc_margin_pct = 2

[location]
# Required when [dispatcher].night_cutoff_enabled = true. Decimal
# degrees, WGS-84. Used to compute local sunrise / sunset.
# Example: München.
# latitude = 48.137
# longitude = 11.575

[home_assistant]
# SoC source switch (global).
#   enabled = false → SoC is read via Modbus TCP directly from each
#                     Marstek battery (default port 502). HA is not used.
#   enabled = true  → SoC is read from HA entities. Every battery MUST
#                     have a soc_entity_id; Modbus is not used.
# Token can be left blank inside the add-on (sourced from
# $SUPERVISOR_TOKEN automatically).
enabled = false
url = "http://homeassistant.local:8123/api"
token = ""
timeout_ms = 3000

# --- Circuits ---
# A circuit is a shared protective device (MCB/RCD). The dispatcher
# enforces (signed sum of plug_w on members) ≤ cap_w × circuit_headroom.

[[circuits]]
id = "basement"
fuse_amps = 16
phases = 1            # 1 = single-phase, 3 = three-phase
voltage = 230
# → cap = 1 × 16 × 230 = 3680 W

# --- Batteries ---
# Each battery is identified by its IP address. Point the battery's
# "Shelly Pro 3EM" target at the multiplexer IP. plug_url is mandatory.

[[batteries]]
id = "marstek-a"
address = "192.168.1.51"           # static IP of the Marstek
circuit = "basement"
plug_url = "http://192.168.1.71"   # dedicated Shelly Plug PM Gen3
max_charge_w = 2500
max_discharge_w = 800
capacity_wh = 2500
priority_weight = 1.0
# Modbus SoC source (used when [home_assistant].enabled = false).
# marstek_model picks the register map per the ViperRNMC integration:
#   "venus_e"     → SoC holding register 34002 (v1 / v2 / v3)
#   "venus_e_v12" → SoC holding register 32104 (Venus E v1.2)
marstek_model = "venus_e"
# modbus_host: IP of the RS485-to-LAN bridge connected to the
# battery's RS485 port — most Marstek variants (A / D / E v1 / v2 /
# v1.2 / E 2.0) do NOT expose Modbus on their own WiFi interface.
# Common bridges:
#   - Waveshare RS485-to-RJ45 Ethernet Converter
#   - Elfin EW11 (WiFi)
#   - PUSR DR134
#   - M5Stack Atom S3 Lite + RS485 base
# For Venus E V3 with an Ethernet cable (recent firmware), set this to
# the same IP as `address` — the battery speaks Modbus TCP natively.
# If you leave this OUT, the battery loads as INACTIVE: the dispatcher
# skips it entirely (no pulses, no SoC poll) until you configure a
# source. Old v0.4.x configs with `vendor` / `marstek_port` continue to
# load — those fields are now ignored.
modbus_host = "192.168.1.91"
modbus_port = 502
modbus_unit_id = 1
soc_interval_ms = 30000
# SoC-based power tapering (optional). Real batteries can't accept
# full max_charge_w near 100 % SoC nor sustain full max_discharge_w
# near the empty cutoff — the BMS tapers internally. Modelling it here
# keeps the dispatcher's headroom math honest and prevents the
# "Marstek target wanders, plug doesn't follow" failure mode.
# Step semantics (no interpolation): SoC ≥ taper_soc → use taper_w.
charge_taper_soc_pct = 90          # at/above this SoC, cap charge…
charge_taper_w = 1000              # …to this many watts
discharge_taper_soc_pct = 15       # at/below this SoC, cap discharge…
discharge_taper_w = 400            # …to this many watts
# Optional per-battery SoC override (defaults to dispatcher.soc_full_pct/empty)
# soc_full_pct = 95
# soc_empty_pct = 5
# Required when [home_assistant].enabled = true (otherwise ignored).
# soc_entity_id = "sensor.marstek_a_soc"

[[batteries]]
id = "marstek-b"
address = "192.168.1.52"
circuit = "basement"
plug_url = "http://192.168.1.72"
max_charge_w = 2500
max_discharge_w = 800
capacity_wh = 2500
priority_weight = 1.0
marstek_model = "venus_e"
modbus_host = "192.168.1.92"   # IP of this battery's RS485-to-LAN bridge
modbus_port = 502
modbus_unit_id = 1
soc_interval_ms = 30000
charge_taper_soc_pct = 90
charge_taper_w = 1000
discharge_taper_soc_pct = 15
discharge_taper_w = 400

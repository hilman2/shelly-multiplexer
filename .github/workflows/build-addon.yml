name: Build & publish HA add-on images

on:
  push:
    tags:
      - "v*"
    branches:
      - main
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "addon/**"
      - ".github/workflows/build-addon.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # amd64 runs natively on the standard x86_64 runners.
          - arch: amd64
            platform: linux/amd64
            base: ghcr.io/home-assistant/amd64-base-debian:bookworm
            runner: ubuntu-latest
          # aarch64 runs natively on GitHub's free public-repo ARM
          # runners — about 5–10× faster than QEMU emulation.
          - arch: aarch64
            platform: linux/arm64
            base: ghcr.io/home-assistant/aarch64-base-debian:bookworm
            runner: ubuntu-24.04-arm
          # armv7 has no native runner, so it stays on QEMU. It's also
          # the architecture fewest HA users still need (Pi 3 with a
          # 32-bit OS); if it ever becomes a bottleneck we can drop it.
          - arch: armv7
            platform: linux/arm/v7
            base: ghcr.io/home-assistant/armv7-base-debian:bookworm
            runner: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.arch == 'armv7'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: addon/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          build-args: |
            BUILD_FROM=${{ matrix.base }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/shelly-multiplexer-${{ matrix.arch }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/shelly-multiplexer-${{ matrix.arch }}:latest
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.arch }},mode=max
